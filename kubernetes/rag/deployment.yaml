apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag
  namespace: roognis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag
  template:
    metadata:
      labels:
        app: rag
    spec:
      containers:
        - name: rag
          image: roognis/rag:latest
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "3003"]
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: rag-secrets
          env:
            - name: PORT
              value: "3003"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
