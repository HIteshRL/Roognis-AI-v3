apiVersion: apps/v1
kind: Deployment
metadata:
  name: classroom
  namespace: roognis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: classroom
  template:
    metadata:
      labels:
        app: classroom
    spec:
      initContainers:
        - name: db-migrate
          image: roognis/classroom:latest
          command: ["sh", "-c", "[ -f prisma/schema.prisma ] && npx prisma db push --schema=prisma/schema.prisma || true"]
          envFrom:
            - secretRef:
                name: classroom-secrets
      containers:
        - name: classroom
          image: roognis/classroom:latest
          command: ["node", "server.js"]
          ports:
            - containerPort: 3005
          envFrom:
            - secretRef:
                name: classroom-secrets
          env:
            - name: PORT
              value: "3005"
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
